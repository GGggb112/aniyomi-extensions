name: Build Aqdm Only
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore signingkey.jks -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass debugpw -keypass debugpw -dname "CN=Debug, OU=Dev, O=Anikku, L=City, S=State, C=CN" -noprompt
          chmod 600 signingkey.jks
      - name: Build Aqdm
        env:
          ALIAS: debug
          KEY_STORE_PASSWORD: debugpw
          KEY_PASSWORD: debugpw
        run: ./gradlew :src:zh:aqdm:assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: aqdm-apk
          path: "**/*.apk"
          retention-days: 7
