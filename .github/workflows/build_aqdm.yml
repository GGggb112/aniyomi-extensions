name: Build Aqdm Only
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Aqdm
        run: ./gradlew :src:zh:aqdm:assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aqdm-apk
          path: "**/*.apk"
          retention-days: 7
